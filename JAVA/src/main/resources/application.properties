# WASAC Utility Billing System — main Spring Boot configuration (database, JWT, mail, Swagger, security).
spring.application.name=wasac-utility-billing

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/ubsdatabase2
spring.datasource.username=postgres
spring.datasource.password=password

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_batch_fetch_size=16

# JWT
app.jwt.secret=${JWT_SECRET:your-256-bit-secret-key-change-in-production-must-be-long-enough}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# OTP
app.otp.expiration-minutes=10
app.otp.length=6

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=iradukundahope94@gmail.com
spring.mail.password=nwyl zfdi ukjt ulvf
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:noreply@wasac.rw}
app.admin.notification-email=${ADMIN_EMAIL:admin@wasac.com}
app.otp.log-to-console=true
app.otp.fail-on-email-error=false

# File upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads
app.upload.allowed-types=image/jpeg,image/png,image/gif,application/pdf

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# CORS
app.cors.allowed-origins=http://localhost:8080,http://127.0.0.1:8080,http://localhost:3000,http://localhost:5173
app.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
app.cors.allowed-headers=*
app.cors.max-age=3600

# Rate Limiting
app.rate-limit.requests-per-minute=60

# Account Lockout
app.security.max-login-attempts=5
app.security.lockout-duration-minutes=30
