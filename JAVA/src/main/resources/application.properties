spring.application.name=enterprise-backend-template

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/project_db
spring.datasource.username=postgres
spring.datasource.password=12345

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT
app.jwt.secret=${JWT_SECRET:your-256-bit-secret-key-change-in-production-must-be-long-enough}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# OTP
app.otp.expiration-minutes=10
app.otp.length=6

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=iradukundahope94@gmail.com
spring.mail.password=cjls rmip yypt eezi
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:noreply@example.com}

# File upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads
app.upload.allowed-types=image/jpeg,image/png,image/gif,application/pdf

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
